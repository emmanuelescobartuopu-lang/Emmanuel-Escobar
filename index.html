<!DOCTYPE html>
<!-- update -->
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Andon Línea</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
    }

   .grid {
  position: relative;
  width: 100%;
  height: 500px;
  border: 2px solid #ccc;
  margin-top: 50px;
    }

    .machine {
      position: absolute;
      width: 100px;
      height: 100px;
      line-height: 100px;
      color: white;
      font-weight: bold;
      border-radius: 10px;
      white-space: pre-line;
    }

    .ok { background-color: green; }
    .fail { background-color: red; }
    .quality { background-color: blue; }
    .setup { background-color: orange; }

    /* Parpadeo */
    .blink {
      animation: blink 1s infinite;
    }

    @keyframes blink {
      50% { opacity: 0.3; }
    }
  </style>
</head>

<body>

<h1>Andon Línea DT</h1>

<div class="grid">
  <div id="M1" class="machine ok" style="top:15px; left:100px;">M1</div>  
  <div id="M2" class="machine fail blink" style="top:15px; left:300px;">M2</div>
  <div id="M3" class="machine quality" style="top:210px; left:100px;">M3</div>
  <div id="M4" class="machine setup" style="top:210px; left:300px;">M4</div>
  <div id="M5" class="machine ok" style="top:355px; left:100px;">M5</div>  
  <div id="M6" class="machine fail blink" style="top:355px; left:300px;">M6</div>
  <div id="M7" class="machine quality" style="top:410px; left:100px;">M7</div>
  <div id="M8" class="machine setup" style="top:410px; left:300px;">M8</div>
</div>

<script>
  // Aquí puedes cambiar estados manualmente
  const estados = {
    M1: "ok",
    M2: "fail",
    M3: "quality",
    M4: "setup",
    M5: "ok",
    M6: "ok",
    M7: "ok",
    M8: "ok"
  };

  for (let maquina in estados) {
  const el = document.getElementById(maquina);
  const estado = estados[maquina];

  el.className = "machine " + estado;

  if (estado === "fail") {
    el.classList.add("blink");
  } else {
    el.classList.remove("blink");
  }

  // 👇 AQUÍ agregas texto dinámico
  el.innerText = maquina + "\n" + estado.toUpperCase();
}
</script>

</body>
</html>
